name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `npx @mycobrain/mcp-server --version` or Docker image tag
      placeholder: "e.g. 1.0.0"
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - npx
        - Docker Compose
        - Railway
        - Manual / other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure DATABASE_URL with ...
        2. Run npx @mycobrain/mcp-server
        3. Call brain.context_pack with query ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS and Node version
      placeholder: "e.g. macOS 14, Node 20.11"
    validations:
      required: false
